trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  TF_VERSION: "1.7.5"
  WORKING_DIR: "$(System.DefaultWorkingDirectory)"

stages:

  # ── INIT + PLAN ─────────────────────────────────────────────────────────────
  - stage: Plan
    displayName: "Terraform Init & Plan"
    jobs:
      - job: TerraformPlan
        displayName: "Init e Plan"
        steps:

          - task: Bash@3
            displayName: "Instalar Terraform $(TF_VERSION)"
            inputs:
              targetType: inline
              script: |
                wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
                unzip -o terraform_$(TF_VERSION)_linux_amd64.zip -d /usr/local/bin/
                terraform version

          - task: Bash@3
            displayName: "Escrever chave privada OCI"
            inputs:
              targetType: inline
              script: |
                mkdir -p ~/.oci
                echo "$(OCI_PRIVATE_KEY)" > ~/.oci/oci_api_key.pem
                chmod 600 ~/.oci/oci_api_key.pem

          - task: Bash@3
            displayName: "Terraform Init"
            inputs:
              targetType: inline
              workingDirectory: $(WORKING_DIR)
              script: terraform init

          - task: Bash@3
            displayName: "Terraform Plan"
            env:
              TF_VAR_tenancy_ocid:     $(OCI_TENANCY_OCID)
              TF_VAR_user_ocid:        $(OCI_USER_OCID)
              TF_VAR_fingerprint:      $(OCI_FINGERPRINT)
              TF_VAR_private_key_path: $(HOME)/.oci/oci_api_key.pem
              TF_VAR_compartment_ocid: $(OCI_COMPARTMENT_OCID)
              TF_VAR_ssh_public_key:   $(SSH_PUBLIC_KEY)
            inputs:
              targetType: inline
              workingDirectory: $(WORKING_DIR)
              script: |
                terraform plan -out=tfplan
                terraform show -no-color tfplan > plan_output.txt
                cat plan_output.txt

          - publish: $(WORKING_DIR)/tfplan
            artifact: tfplan

          - publish: $(WORKING_DIR)/plan_output.txt
            artifact: plan_output

  # ── APROVAÇÃO MANUAL ─────────────────────────────────────────────────────────
  - stage: Approval
    displayName: "Aprovação Manual"
    dependsOn: Plan
    jobs:
      - job: WaitForApproval
        displayName: "Aguardando aprovação"
        pool: server
        steps:
          - task: ManualValidation@0
            displayName: "Revisar e aprovar o Terraform Plan"
            inputs:
              notifyUsers: "$(APPROVER_EMAIL)"
              instructions: |
                Revise o plan gerado na etapa anterior antes de aprovar.
                O apply irá criar/modificar recursos no compartment labpipeline (sa-saopaulo-1).
              onTimeout: reject
              timeout: 60

  # ── APPLY ────────────────────────────────────────────────────────────────────
  - stage: Apply
    displayName: "Terraform Apply"
    dependsOn: Approval
    jobs:
      - job: TerraformApply
        displayName: "Apply"
        steps:

          - task: Bash@3
            displayName: "Instalar Terraform $(TF_VERSION)"
            inputs:
              targetType: inline
              script: |
                wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
                unzip -o terraform_$(TF_VERSION)_linux_amd64.zip -d /usr/local/bin/

          - task: Bash@3
            displayName: "Escrever chave privada OCI"
            inputs:
              targetType: inline
              script: |
                mkdir -p ~/.oci
                echo "$(OCI_PRIVATE_KEY)" | base64 -d > ~/.oci/oci_api_key.pem
                chmod 600 ~/.oci/oci_api_key.pem
                echo "Linhas no arquivo pem: $(wc -l < ~/.oci/oci_api_key.pem)"

          - download: current
            artifact: tfplan

          - task: Bash@3
            displayName: "Terraform Init"
            inputs:
              targetType: inline
              workingDirectory: $(WORKING_DIR)
              script: terraform init

          - task: Bash@3
            displayName: "Terraform Apply"
            env:
              TF_VAR_tenancy_ocid:     $(OCI_TENANCY_OCID)
              TF_VAR_user_ocid:        $(OCI_USER_OCID)
              TF_VAR_fingerprint:      $(OCI_FINGERPRINT)
              TF_VAR_private_key_path: $(HOME)/.oci/oci_api_key.pem
              TF_VAR_compartment_ocid: $(OCI_COMPARTMENT_OCID)
              TF_VAR_ssh_public_key:   $(SSH_PUBLIC_KEY)
            inputs:
              targetType: inline
              workingDirectory: $(WORKING_DIR)
              script: |
                terraform apply -auto-approve \
                  $(Pipeline.Workspace)/tfplan/tfplan