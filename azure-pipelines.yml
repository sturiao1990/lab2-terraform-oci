trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: oci-credentials
  - name: TF_VERSION
    value: "1.7.5"
  - name: WORKING_DIR
    value: "$(System.DefaultWorkingDirectory)"
  - name: OCI_KEY_PATH
    value: "/home/vsts/.oci/andresturiao.pem"

stages:

  # ── INIT + PLAN ─────────────────────────────────────────────────────────────
  - stage: Plan
    displayName: "Terraform Init & Plan"
    jobs:
      - job: TerraformPlan
        displayName: "Init e Plan"
        steps:

          - task: Bash@3
            displayName: "Instalar Terraform $(TF_VERSION)"
            inputs:
              targetType: inline
              script: |
                wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
                unzip -o terraform_$(TF_VERSION)_linux_amd64.zip -d /usr/local/bin/
                terraform version

          - task: DownloadSecureFile@1
            displayName: "Baixar chave privada OCI"
            name: ociKey
            inputs:
              secureFile: "andresturiao.pem"

          - task: Bash@3
            displayName: "Instalar e validar chave privada OCI"
            inputs:
              targetType: inline
              script: |
                mkdir -p /home/vsts/.oci
                cp $(ociKey.secureFilePath) $(OCI_KEY_PATH)
                chmod 600 $(OCI_KEY_PATH)
                echo "=== Header e footer da chave ==="
                head -1 $(OCI_KEY_PATH)
                tail -1 $(OCI_KEY_PATH)
                echo "=== Linhas ==="
                wc -l $(OCI_KEY_PATH)
                echo "=== Validação OpenSSL ==="
                openssl pkey -in $(OCI_KEY_PATH) -check -noout 2>&1

          - task: Bash@3
            displayName: "Terraform Init"
            inputs:
              targetType: inline
              workingDirectory: $(WORKING_DIR)
              script: terraform init

          - task: Bash@3
            displayName: "Terraform Plan"
            env:
              TF_VAR_tenancy_ocid:     $(OCI_TENANCY_OCID)
              TF_VAR_user_ocid:        $(OCI_USER_OCID)
              TF_VAR_fingerprint:      $(OCI_FINGERPRINT)
              TF_VAR_private_key_path: $(OCI_KEY_PATH)
              TF_VAR_compartment_ocid: $(OCI_COMPARTMENT_OCID)
              TF_VAR_ssh_public_key:   $(SSH_PUBLIC_KEY)
              TF_VAR_region:           $(OCI_REGION)
            inputs:
              targetType: inline
              workingDirectory: $(WORKING_DIR)
              script: |
                terraform plan -out=tfplan
                terraform show -no-color tfplan > plan_output.txt
                cat plan_output.txt

          - publish: $(WORKING_DIR)/tfplan
            artifact: tfplan
            displayName: "Publicar plano"

          - publish: $(WORKING_DIR)/plan_output.txt
            artifact: plan_output
            displayName: "Publicar output do plan"

  # ── APROVAÇÃO MANUAL ─────────────────────────────────────────────────────────
  - stage: Approval
    displayName: "Aprovação Manual"
    dependsOn: Plan
    jobs:
      - job: WaitForApproval
        displayName: "Aguardando aprovação"
        pool: server
        steps:
          - task: ManualValidation@0
            displayName: "Revisar e aprovar o Terraform Plan"
            inputs:
              instructions: |
                Revise o plan gerado na etapa anterior antes de aprovar.
                O apply irá criar/modificar recursos no compartment labpipeline (sa-saopaulo-1).
              onTimeout: reject
              timeout: 60

  # ── APPLY ────────────────────────────────────────────────────────────────────
  - stage: Apply
    displayName: "Terraform Apply"
    dependsOn: Approval
    jobs:
      - job: TerraformApply
        displayName: "Apply"
        steps:

          - task: Bash@3
            displayName: "Instalar Terraform $(TF_VERSION)"
            inputs:
              targetType: inline
              script: |
                wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
                unzip -o terraform_$(TF_VERSION)_linux_amd64.zip -d /usr/local/bin/
                terraform version

          - task: DownloadSecureFile@1
            displayName: "Baixar chave privada OCI"
            name: ociKey
            inputs:
              secureFile: "andresturiao.pem"

          - task: Bash@3
            displayName: "Instalar chave privada OCI"
            inputs:
              targetType: inline
              script: |
                mkdir -p /home/vsts/.oci
                cp $(ociKey.secureFilePath) $(OCI_KEY_PATH)
                chmod 600 $(OCI_KEY_PATH)

          - download: current
            artifact: tfplan
            displayName: "Baixar plano aprovado"

          - task: Bash@3
            displayName: "Terraform Init"
            inputs:
              targetType: inline
              workingDirectory: $(WORKING_DIR)
              script: terraform init

          - task: Bash@3
            displayName: "Terraform Apply"
            env:
              TF_VAR_tenancy_ocid:     $(OCI_TENANCY_OCID)
              TF_VAR_user_ocid:        $(OCI_USER_OCID)
              TF_VAR_fingerprint:      $(OCI_FINGERPRINT)
              TF_VAR_private_key_path: $(OCI_KEY_PATH)
              TF_VAR_compartment_ocid: $(OCI_COMPARTMENT_OCID)
              TF_VAR_ssh_public_key:   $(SSH_PUBLIC_KEY)
              TF_VAR_region:           $(OCI_REGION)
            inputs:
              targetType: inline
              workingDirectory: $(WORKING_DIR)
              script: |
                terraform apply -auto-approve \
                  $(Pipeline.Workspace)/tfplan/tfplan
                  #fim12345